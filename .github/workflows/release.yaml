name: Build packages

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { icon: '🟦', sys: mingw64, runs-on: 'windows-latest' }
          - { icon: '🟨', sys: ucrt64, runs-on: 'windows-latest' }
          - { icon: '🟧', sys: clang64, runs-on: 'windows-latest' }
          - { icon: '🟩', sys: clangarm64, runs-on: 'windows-11-arm' }
    name: 🚧${{ matrix.icon }} ${{ matrix.sys }}
    defaults:
      run:
        shell: msys2 {0}
    steps:

    - name: '🧰 Checkout'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: '${{ matrix.icon }} Setup MSYS2'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{matrix.sys}}
        update: true
        install: >-
          git
          make
          dos2unix
        pacboy: >-
          toolchain:p
          cmake:p
          ninja:p

    - name: '🚧 Build Skia'
      run: |
        dos2unix PKGBUILD
        updpkgsums
        MINGW_ARCH=${{ matrix.sys }} makepkg-mingw --cleanbuild --syncdeps --force --noconfirm
